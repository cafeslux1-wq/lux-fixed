<script>
    const { createApp } = Vue;

    // جلب بيانات الرابط مرة واحدة
    const _urlParams = new URLSearchParams(window.location.search);
    const _station = _urlParams.get('station') || '05';

    createApp({
        data() {
            return {
                view: 'user',
                stationId: _station,
                hourlyRate: 30,
                elapsedSeconds: 0,
                consumedAmount: 0,
                timerInterval: null,
                heartbeatInterval: null,
                // تفعيل جميع طرق الأداء المطلوبة
                paymentMethods: [
                    { id: 'especes', label: 'Espèces (Cash)', icon: 'fas fa-money-bill-wave', color: '#22c55e', desc: 'Paiement au comptoir' },
                    { id: 'paypal',  label: 'PayPal',          icon: 'fab fa-paypal',          color: '#0070ba', desc: 'Portefeuille numérique' },
                    { id: 'googlepay', label: 'Google Pay',    icon: 'fab fa-google-pay',      color: '#ffffff', desc: 'Paiement rapide' },
                    { id: 'carte',   label: 'Carte Bancaire',  icon: 'fas fa-credit-card',     color: '#22d3ee', desc: 'Paiement sécurisé Stripe' }
                ]
            }
        },
        computed: {
            formattedTime() {
                const h = Math.floor(this.elapsedSeconds / 3600);
                const m = Math.floor((this.elapsedSeconds % 3600) / 60);
                const s = this.elapsedSeconds % 60;
                return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            }
        },
        methods: {
            async startSession(methodId) {
                console.log("Starting session with:", methodId);
                this.view = 'active';
                this.elapsedSeconds = 0;

                // محاولة الاتصال بـ API التفعيل
                try {
                    if (window.LuxAPI && window.LuxAPI.activateStation) {
                        await window.LuxAPI.activateStation(this.stationId, 1);
                    }
                } catch (e) { 
                    console.warn("LuxAPI Activation skipped or failed, using local timer."); 
                }

                // تشغيل العداد المحلي
                this.timerInterval = setInterval(() => {
                    this.elapsedSeconds++;
                    this.consumedAmount = (this.hourlyRate / 3600) * this.elapsedSeconds;
                }, 1000);

                // معالجة الـ Heartbeat لتفادي توقف البرنامج عند خطأ 404
                this.heartbeatInterval = setInterval(async () => {
                    if (window.LuxAPI && window.LuxAPI.stationHeartbeat) {
                        try {
                            await window.LuxAPI.stationHeartbeat(this.stationId);
                        } catch (err) {
                            // تجاهل خطأ 404 لضمان استمرار واجهة المستخدم في العمل
                        }
                    }
                }, 30000);
            },
            async endSession() {
                if (!confirm("Voulez-vous vraiment terminer la session ?")) return;
                
                clearInterval(this.timerInterval);
                clearInterval(this.heartbeatInterval);

                try {
                    if (window.LuxAPI && window.LuxAPI.deactivateStation) {
                        await window.LuxAPI.deactivateStation(this.stationId);
                    }
                } catch (e) {}

                this.view = 'user';
            }
        }
    }).mount('#app');
</script>
