<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
// GitHub Pages 404 → redirect to index.html with path encoded as ?p=
// e.g. /portal/pos → index.html?p=/portal/pos
var path = window.location.pathname;
var query = window.location.search;
var hash = window.location.hash;
window.location.replace(
  window.location.origin + '/?p=' + encodeURIComponent(path + query + hash)
);
</script>
</head>
<body></body>
</html>
