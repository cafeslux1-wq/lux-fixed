<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Gaming Zone · Production</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="api-client.js" defer></script>
    
    <style>
        :root { --lux-gold: #C9A84C; --lux-dark: #050505; }
        body { 
            background-color: var(--lux-dark); 
            color: #FFF; 
            font-family: 'Cairo', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%);
            min-height: 100vh;
        }
        .lux-card { background: rgba(15, 15, 16, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="p-6 md:p-12 flex flex-col items-center">
        
        <header class="w-full max-w-4xl flex justify-between items-center mb-16">
            <div class="flex items-center gap-5 text-right">
                <div>
                    <h2 class="text-2xl font-black text-white italic uppercase font-playfair">
                        LUX <span style="color:var(--lux-gold)">GAMING</span>
                    </h2>
                    <p class="text-[9px] text-gray-500 font-bold tracking-[0.3em] mt-1">STATION #{{stationId}}</p>
                </div>
            </div>
            <div class="text-zinc-500">
                <i class="fas fa-signal text-xs"></i> Online
            </div>
        </header>

        <main class="w-full max-w-xl">
            <div v-if="view === 'user'" class="space-y-4">
                <div v-for="method in paymentMethods" :key="method.id" 
                     @click="startSession(method.id)" 
                     class="lux-card p-6 rounded-[2rem] flex items-center justify-between cursor-pointer hover:border-[#C9A84C] transition-all group">
                    <div class="flex items-center gap-5">
                        <i :class="method.icon" :style="{color: method.color}" class="text-2xl"></i>
                        <div class="text-right">
                            <p class="font-bold text-white">{{method.label}}</p>
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">{{method.desc}}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-left text-zinc-800 group-hover:text-[#C9A84C]"></i>
                </div>
            </div>

            <div v-if="view === 'active'" class="lux-card py-20 px-10 rounded-[3rem] text-center border-[#C9A84C]/20">
                <div class="text-7xl font-mono font-black mb-4 tracking-tighter text-white">{{formattedTime}}</div>
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.4em] mb-12">SESSION ACTIVE</p>
                <button @click="endSession" class="w-full bg-red-600/10 text-red-500 py-5 rounded-2xl font-black hover:bg-red-600 hover:text-white transition-all uppercase tracking-widest">
                    Terminer la Session
                </button>
            </div>
        </main>
    </div>

    <script>
const { createApp } = Vue;

const _qs = new URLSearchParams(window.location.search);
const _station = _qs.get('station') || '05';

createApp({
    data() {
        return {
            view: 'user', // الواجهة الافتراضية
            stationId: _station,
            hourlyRate: 30,
            elapsedSeconds: 0,
            consumedAmount: 0,
            timerInterval: null,
            heartbeatInterval: null,
            apiData: null
        }
    },
    computed: {
        formattedTime() {
            const h = Math.floor(this.elapsedSeconds / 3600);
            const m = Math.floor((this.elapsedSeconds % 3600) / 60);
            const s = this.elapsedSeconds % 60;
            return `${h > 0 ? h + ':' : ''}${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }
    },
    methods: {
        // فحص حالة المحطة من السيرفر فور تحميل الصفحة
        async checkStationStatus() {
            try {
                if (window.LuxAPI && window.LuxAPI.getGamingStations) {
                    const stations = await window.LuxAPI.getGamingStations();
                    // البحث عن المحطة الحالية في البيانات القادمة من Railway
                    const current = stations.find(s => s.id.includes(this.stationId));
                    
                    if (current && current.status === 'active') {
                        this.view = 'active';
                        // تحويل الوقت النصي (مثل 42:10) إلى ثوانٍ لتشغيل العداد
                        this.syncTimer(current.time || "00:00");
                    }
                }
            } catch (e) {
                console.warn("فشل جلب حالة المحطة، سيتم الاعتماد على التشغيل المحلي.");
            }
        },

        syncTimer(timeStr) {
            const parts = timeStr.split(':').map(Number);
            let totalSeconds = 0;
            if (parts.length === 2) totalSeconds = (parts[0] * 60) + parts[1];
            if (parts.length === 3) totalSeconds = (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            
            this.elapsedSeconds = totalSeconds;
            this.startLocalTimer();
        },

        async startSession(methodId) {
            this.view = 'active';
            this.elapsedSeconds = 0;

            try {
                if (window.LuxAPI && window.LuxAPI.activateStation) {
                    await window.LuxAPI.activateStation(this.stationId, 1);
                }
            } catch (e) {}

            this.startLocalTimer();
        },

        startLocalTimer() {
            if (this.timerInterval) clearInterval(this.timerInterval);
            this.timerInterval = setInterval(() => {
                this.elapsedSeconds++;
                this.consumedAmount = (this.hourlyRate / 3600) * this.elapsedSeconds;
            }, 1000);
        }
    },
    mounted() {
        // بمجرد فتح الصفحة، نفحص هل المحطة تعمل أصلاً في السيرفر؟
        this.checkStationStatus();
    }
}).mount('#app');
</script>
