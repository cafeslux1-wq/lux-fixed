<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX PRO - لوحة تحكم الإدارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const stations = [
                { id: 1, status: 'Active', user: 'أحمد', time: '42:10' },
                { id: 2, status: 'Inactive', user: '-', time: '00:00' },
                { id: 3, status: 'Warning', user: 'ياسين', time: '04:55' },
                { id: 4, status: 'Active', user: 'كريم', time: '118:20' },
            ];

            return (
                <div className="min-h-screen text-slate-200 p-8 md:p-12">
                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
                        <div>
                            <h1 className="text-4xl font-black text-white mb-2 tracking-tighter">إحصائيات <span className="text-cyan-400">Lux AI</span></h1>
                            <p className="text-slate-500">مراقبة محطات الجيمنج الموحدة مع المايسترو.</p>
                        </div>
                        <div className="flex gap-4">
                            <div className="glass px-6 py-3 rounded-2xl flex items-center gap-3">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <span className="text-xs font-bold text-slate-400 uppercase">Railway Online</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                        {stations.map(s => (
                            <div key={s.id} className="glass p-8 rounded-[2.5rem] flex items-center justify-between hover:border-slate-400 transition-all cursor-pointer group">
                                <div className="flex items-center gap-6">
                                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center font-black text-2xl ${
                                        s.status === 'Active' ? 'bg-cyan-500/10 text-cyan-400' : 'bg-slate-800 text-slate-600'
                                    }`}>
                                        {s.id}
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-white text-lg">المحطة #{s.id}</h4>
                                        <p className="text-xs text-slate-500 uppercase tracking-widest font-bold">الزبون: {s.user}</p>
                                    </div>
                                </div>
                                <div className="text-left">
                                    <div className={`text-3xl font-mono font-black ${s.status === 'Warning' ? 'text-orange-500 animate-pulse' : 'text-white'}`}>
                                        {s.time}
                                    </div>
                                    <p className="text-[10px] text-slate-600 font-bold uppercase">{s.status}</p>
                                </div>
                            </div>
                        ))}
                    </main>

                    <footer className="max-w-6xl mx-auto mt-20 text-center text-[10px] text-slate-700 font-bold uppercase tracking-[0.5em]">
                        Lux x Maestro • Professional Admin Hub
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
