<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Gaming - واجهة الزبون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; }
        .animate-pulse-slow { animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // الرابط السحابي الخاص بك
        const API_URL = "https://cafeslux-api-production-0b60.up.railway.app";

        const App = () => {
            const [session, setSession] = useState({ active: false, timeLeft: 0, stationId: "05" });
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                let timer;
                if (session.active && session.timeLeft > 0) {
                    timer = setInterval(() => {
                        setSession(prev => ({ ...prev, timeLeft: prev.timeLeft - 1 }));
                    }, 1000);
                } else if (session.active && session.timeLeft === 0) {
                    setSession(prev => ({ ...prev, active: false }));
                    setView('home');
                }
                return () => clearInterval(timer);
            }, [session.active, session.timeLeft]);

            const handlePayment = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}/api/gaming/activate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ stationId: session.stationId, hours: 1 })
                    });
                    if (res.ok) {
                        setSession({ ...session, active: true, timeLeft: 3600 });
                        setView('active');
                    }
                } catch (e) { alert("تعذر الاتصال بالسيرفر السحابي"); }
                setLoading(false);
            };

            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const sec = s % 60;
                return `${m}:${sec < 10 ? '0' : ''}${sec}`;
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6 text-white">
                    <div className="w-full max-w-md bg-zinc-900/80 border border-zinc-800 rounded-[3rem] p-10 backdrop-blur-xl shadow-2xl overflow-hidden relative">
                        {/* زخرفة خلفية */}
                        <div className="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl -z-10"></div>
                        
                        <header className="flex justify-between items-center mb-12">
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter uppercase">Lux <span className="text-cyan-400 font-light">Gaming</span></h1>
                                <p className="text-[10px] text-zinc-500 font-bold tracking-[0.3em]">STATION #{session.stationId}</p>
                            </div>
                            <div className="w-12 h-12 bg-zinc-800 rounded-2xl flex items-center justify-center">🎮</div>
                        </header>

                        {view === 'home' && (
                            <div className="text-center py-6">
                                <div className="text-6xl mb-6">🕹️</div>
                                <h2 className="text-2xl font-bold mb-4">جاهز للعب؟</h2>
                                <p className="text-zinc-500 text-sm mb-10 leading-relaxed">باقة الساعة الواحدة الآن بـ 30 درهم فقط. ادفع وابدأ اللعب فوراً.</p>
                                <button 
                                    onClick={() => setView('payment')}
                                    className="w-full bg-white text-black py-5 rounded-[2rem] font-black text-lg shadow-lg hover:scale-105 transition-all"
                                >
                                    ابدأ الجلسة الآن
                                </button>
                            </div>
                        )}

                        {view === 'payment' && (
                            <div>
                                <h3 className="text-xl font-bold mb-8">اختر وسيلة الدفع:</h3>
                                <div className="space-y-4">
                                    {['بطاقة بنكية', 'PayPal', 'دفع نقدي'].map(m => (
                                        <button 
                                            key={m} 
                                            onClick={handlePayment}
                                            className="w-full bg-zinc-950 border border-zinc-800 p-5 rounded-2xl flex justify-between items-center hover:border-cyan-500 transition-all group"
                                        >
                                            <span className="font-bold">{m}</span>
                                            <span className="text-zinc-700 group-hover:text-cyan-400">←</span>
                                        </button>
                                    ))}
                                </div>
                                {loading && <p className="mt-6 text-center text-cyan-400 animate-pulse font-bold">جاري تفعيل الشاشة...</p>}
                            </div>
                        )}

                        {view === 'active' && (
                            <div className="text-center py-10">
                                <div className="text-7xl font-mono font-black mb-4 text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                                    {formatTime(session.timeLeft)}
                                </div>
                                <p className="text-zinc-500 uppercase text-[10px] font-bold tracking-widest mb-12">الوقت المتبقي</p>
                                <button className="w-full bg-zinc-800 py-5 rounded-[2rem] font-bold border border-zinc-700">تمديد الوقت +</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
