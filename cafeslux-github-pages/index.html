<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Café LUX — Taza · Café & Pâtisserie</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C9A84C">
<script>
  window.LUX_API_URL = 'https://cafeslux-api-production.up.railway.app'; 
</script>
<script src="api-client.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── الأنماط (CSS) ── */
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#8B6E2F;--bg:#080808;--bg2:#0F0F0F;
  --text:#F2EFE9;--muted:#888;--green:#3DBE7A;--red:#E05252;--cream:#FAFAF5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
#gateway{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease;}
#gateway.hidden{opacity:0;pointer-events:none;}
.gw-logo{font-family:'Cinzel',serif;font-size:52px;color:var(--gold);letter-spacing:10px;}
.gw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:640px;width:90%;}
.gw-tile{background:var(--bg2);border:1px solid #2A2A2A;border-radius:14px;padding:20px;text-align:center;cursor:pointer;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid #2A2A2A;display:flex;align-items:center;padding:0 24px;height:60px;justify-content:space-between;}
.tb-logo{font-family:'Cinzel',serif;color:var(--gold);font-size:20px;text-decoration:none;}
.site-top-tabs{display:flex;background:var(--bg2);border-bottom:1px solid #2A2A2A;padding:0 24px;overflow-x:auto;}
.s-tab{padding:14px 20px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;}
.s-tab.active{color:var(--gold);border-bottom:2px solid var(--gold);}
#cart-panel{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--cream);z-index:500;transform:translateX(100%);transition:transform .3s ease;box-shadow:-8px 0 32px rgba(0,0,0,0.5);display:flex;flex-direction:column;}
#cart-panel.open{transform:translateX(0);}
.cart-head{background:#1A0A00;padding:16px 20px;color:var(--gold);display:flex;justify-content:space-between;}
.cart-items-list{flex:1;overflow-y:auto;padding:14px;color:#000;}
</style>
</head>
<body>

<div id="gateway">
  <div class="gw-logo">LUX</div>
  <div style="color:var(--muted); font-size:11px; margin-bottom:40px;">TAZA · 2026</div>
  <div class="gw-grid">
    <div class="gw-tile" onclick="enterPublic()">🛒 <br> Commander</div>
    <div class="gw-tile" onclick="enterReservation()">📅 <br> Réserver</div>
    <div class="gw-tile" onclick="enterTracking()">📦 <br> Suivi</div>
  </div>
</div>

<div id="main-site" style="display:none">
  <div class="topbar">
    <a class="tb-logo" href="#">✦ LUX</a>
    <button onclick="toggleCart()" style="background:var(--gold); border:none; padding:8px 16px; border-radius:20px; font-weight:bold; cursor:pointer;">
      Panier (<span id="cart-count">0</span>)
    </button>
  </div>

  <div class="site-top-tabs">
    <button class="s-tab active" onclick="switchTab('menu')">🛒 Menu</button>
    <button class="s-tab" onclick="switchTab('tracking')">📦 Commandes</button>
    <button class="s-tab" onclick="switchTab('reservation')">📅 Réservation</button>
    <button class="s-tab" onclick="switchTab('account')">👤 Fidélité</button>
  </div>

  <div id="tab-menu" class="site-tab-content" style="padding:20px;">
    <h2 style="text-align:center; color:var(--gold); font-family:'Cormorant Garamond'; font-size:32px;">Notre Menu</h2>
    <div id="menu-content" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;"></div>
  </div>

  <div id="tab-tracking" class="site-tab-content" style="display:none; padding:40px 20px;">
    <h3>📦 Suivi de commande</h3>
    <input type="tel" id="track-phone" placeholder="Votre téléphone" style="width:100%; padding:12px; margin:10px 0; background:#111; color:#fff; border:1px solid #333; border-radius:8px;">
    <button onclick="trackOrders()" style="width:100%; padding:12px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">Rechercher</button>
    <div id="track-results" style="margin-top:20px;"></div>
  </div>

  <div id="tab-reservation" class="site-tab-content" style="display:none; padding:20px;">
    <h3 style="color:var(--gold)">📅 Réserver une table</h3>
    <input type="text" id="res-name" placeholder="Nom" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="tel" id="res-phone" placeholder="Téléphone" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="date" id="res-date" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="submitReservation()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">Confirmer</button>
  </div>
</div>

<div id="cart-panel">
  <div class="cart-head">
    <h3>🛒 Mon Panier</h3>
    <button onclick="toggleCart()" style="background:none; border:1px solid #fff; color:#fff;">✕</button>
  </div>
  <div id="cart-items-list" class="cart-items-list"></div>
  <div style="padding:20px; background:#fff; border-top:1px solid #ddd;">
    <input type="text" id="wo-name" placeholder="Nom" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="tel" id="wo-phone" placeholder="Téléphone" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="sendOrder()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">Commander</button>
  </div>
</div>

<script>
/* ─── المكونات البرمجية المصححة ─── */
let cart = [];
const MENU_DATA = [
  {n: "Espresso", p: 10, cat: "☕"},
  {n: "Cappuccino", p: 15, cat: "🥛"},
  {n: "Petit Déjeuner LUX", p: 35, cat: "🍳"},
  {n: "Thé Royal", p: 20, cat: "🍵"}
];

function enterPublic() {
  document.getElementById('gateway').classList.add('hidden');
  document.getElementById('main-site').style.display = 'block';
  renderMenu();
}

function switchTab(tab) {
  document.querySelectorAll('.site-tab-content').forEach(el => el.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
}

function renderMenu() {
  const cont = document.getElementById('menu-content');
  cont.innerHTML = MENU_DATA.map(item => `
    <div style="background:#fff; color:#000; padding:15px; border-radius:12px; text-align:center;" onclick="addToCart('${item.n}', ${item.p})">
      <div style="font-size:24px;">${item.cat}</div>
      <div style="font-weight:bold;">${item.n}</div>
      <div style="color:var(--gold-d)">${item.p} MAD</div>
    </div>
  `).join('');
}

function addToCart(n, p) { cart.push({n, p}); updateCartUI(); }
function updateCartUI() { document.getElementById('cart-count').textContent = cart.length; }
function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }

/* ─── الدوال المصححة بـ ASYNC / AWAIT ─── */

// ✅ الإصلاح النهائي لدالة التتبع
async function trackOrders() {
  const phone = document.getElementById('track-phone').value;
  const resDiv = document.getElementById('track-results');
  resDiv.innerHTML = "Recherche en cours...";

  try {
    let cust = null;
    if (typeof LuxAPI !== 'undefined') {
      // ✅ هنا تم استخدام await داخل async بنجاح
      cust = await LuxAPI.getCustomer(phone);
    }
    if (!cust) {
      resDiv.innerHTML = "❌ Aucune commande trouvée.";
    } else {
      resDiv.innerHTML = `<h4>Bienvenue ${cust.name}</h4>` + 
        cust.orders.map(o => `<div style="background:#222; padding:10px; margin-top:5px; border-radius:5px;">Commande #${String(o.id).slice(-6)} - Statut: ${o.status}</div>`).join('');
    }
  } catch (e) {
    resDiv.innerHTML = "⚠️ Erreur de connexion.";
  }
}

// ✅ دالة إرسال الطلب المصححة
async function sendOrder() {
  const name = document.getElementById('wo-name').value;
  const phone = document.getElementById('wo-phone').value;
  if(!name || !phone) return alert("Nom et téléphone requis");

  const orderData = { id: Date.now(), customer: name, phone: phone, items: cart, total: cart.reduce((s,i)=>s+i.p, 0), status: 'pending' };

  try {
    if (typeof LuxAPI !== 'undefined') {
      await LuxAPI.createOrder(orderData);
    }
    alert("✅ Commande envoyée !");
    cart = []; updateCartUI(); toggleCart();
  } catch(e) {
    alert("⚠️ Erreur d'envoi.");
  }
}

// ✅ دالة الحجز المصححة
async function submitReservation() {
  const data = {
    name: document.getElementById('res-name').value,
    phone: document.getElementById('res-phone').value,
    date: document.getElementById('res-date').value
  };
  try {
    if (typeof LuxAPI !== 'undefined') {
      await LuxAPI.createReservation(data);
    }
    alert("✅ Réservation confirmée !");
  } catch(e) {
    alert("⚠️ Erreur.");
  }
}

window.onload = async () => {
  if (typeof LuxAPI !== 'undefined') {
    await LuxAPI.init();
    console.log("Lux API Ready");
  }
};
</script>
</body>
</html>
