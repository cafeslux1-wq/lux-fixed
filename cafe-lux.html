<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFE LUX — Engine v3.5</title>
    <style>
        :root { --gold: #C9A84C; --bg: #0D0D0D; --text: #F0EDE8; --card: #161616; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .payment-methods { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .pay-badge { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--gold); font-size: 12px; color: var(--gold); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .product-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .product-img { width: 100%; height: 100px; background: #333 url('https://cafeslux.com/logo.png') center/contain no-repeat; }
        .product-info { padding: 10px; text-align: center; }
        .print-btn { background: var(--gold); color: #000; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        @media print { .no-print { display: none; } body { background: white; color: black; } }
    </style>
</head>
<body>
    <div class="no-print">
        <h2 id="title" style="color:var(--gold); font-family:serif;">Chargement...</h2>
        
        <div id="payment-ui" style="display:none;">
            <div class="payment-methods">
                <span class="pay-badge">💵 Cash</span>
                <span class="pay-badge">💳 Carte</span>
                <span class="pay-badge">🅿️ PayPal</span>
                <span class="pay-badge">📱 G-Pay</span>
                <span class="pay-badge">📟 TPE</span>
            </div>
        </div>

        <div id="content" class="product-grid"></div>
        <button class="print-btn" onclick="window.print()">⎙ Imprimer Ticket Direct</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const view = params.get('view');

        const titles = {
            'menu': 'La Carte & Site Public',
            'offers': 'Vos Privilèges LUX',
            'booking': 'Réservation de Table',
            'pos': 'Caisse Terminal POS',
            'admin': 'Administration Dashboard'
        };

        const target = view || mode;
        document.getElementById('title').innerText = titles[target] || "Espace LUX";

        if(target === 'menu' || mode === 'web') {
            document.getElementById('payment-ui').style.display = 'block';
            // محاكاة عرض المنتجات بالصور
            const items = ["Espresso", "Croissant", "Latte", "Thé Menthe"];
            items.forEach(item => {
                document.getElementById('content').innerHTML += `
                    <div class="product-card">
                        <div class="product-img"></div>
                        <div class="product-info"><strong>${item}</strong><br>25 DH</div>
                    </div>`;
            });
        } else {
            document.getElementById('content').innerHTML = `<p>Bienvenue dans l'espace ${target.toUpperCase()}. Prêt pour le service.</p>`;
        }
    </script>
</body>
</html>
