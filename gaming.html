<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Gaming Zone · Production v9.3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <script>window.LUX_API_URL = 'https://cafeslux-api-production.up.railway.app';</script>
    <script src="api-client.js" defer></script>

    <style>
        :root { --lux-gold: #C9A84C; --lux-dark: #050505; --lux-card: rgba(15, 15, 16, 0.7); }
        body { font-family: 'Inter', 'Cairo', sans-serif; background-color: var(--lux-dark); color: #FFF; min-height: 100vh; }
        .lux-card { background: var(--lux-card); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.03); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div class="p-6 md:p-12 flex flex-col items-center">
            <header class="w-full max-w-4xl flex justify-between items-center mb-16">
                <h2 class="text-2xl font-black text-white italic font-playfair">
                    LUX <span style="color:var(--lux-gold)">GAMING</span>
                </h2>
                <div class="text-[10px] text-zinc-500 uppercase tracking-widest">Station #{{stationId}}</div>
            </header>

            <main class="w-full max-w-xl">
                <div v-if="view === 'user'" class="lux-card py-16 px-10 rounded-[3.5rem] text-center">
                    <h2 class="text-3xl font-black mb-8 font-playfair italic">Prêt pour l'aventure ?</h2>
                    <button @click="view = 'payment'" class="w-full bg-[#C9A84C] text-black py-6 rounded-[2.2rem] font-black text-xl hover:scale-[1.02] transition-all shadow-lg">
                        COMMENCER
                    </button>
                </div>

                <div v-if="view === 'payment'" class="space-y-4">
                    <button v-for="method in paymentMethods" @click="handleStartSession(method.id)" class="lux-card w-full p-6 rounded-[2.2rem] flex justify-between items-center hover:border-[#C9A84C]">
                        <span class="font-bold">{{method.label}}</span>
                        <i :class="method.icon" :style="{color: method.color}"></i>
                    </button>
                </div>

                <div v-if="view === 'active'" class="lux-card py-16 px-10 rounded-[4rem] text-center border-[#C9A84C]/20 shadow-[0_0_60px_rgba(201,168,76,0.1)]">
                    <div class="text-7xl font-mono font-black mb-8">{{formattedTime}}</div>
                    <p class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.4em] mb-8">TEMPS DE JEU ACTIF</p>
                    <button @click="endSession" class="bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white px-12 py-4 rounded-full font-black uppercase tracking-widest transition-all">TERMINER</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    view: 'user',
                    stationId: new URLSearchParams(window.location.search).get('station') || '05',
                    hourlyRate: 30,
                    elapsedSeconds: 0,
                    timerInterval: null,
                    heartbeatInterval: null,
                    paymentMethods: [
                        { id: 'cash', label: 'Espèces (Cash)', icon: 'fas fa-money-bill-wave', color: '#22c55e' },
                        { id: 'card', label: 'Carte Bancaire', icon: 'fas fa-credit-card', color: '#22d3ee' }
                    ]
                }
            },
            computed: {
                formattedTime() {
                    const h = Math.floor(this.elapsedSeconds / 3600);
                    const m = Math.floor((this.elapsedSeconds % 3600) / 60);
                    const s = this.elapsedSeconds % 60;
                    return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                }
            },
            methods: {
                async handleStartSession(method) {
                    this.view = 'active';
                    this.elapsedSeconds = 0;
                    
                    // محاولة التفعيل
                    try {
                        if(window.LuxAPI && window.LuxAPI.activateStation) {
                            await window.LuxAPI.activateStation(this.stationId, 1);
                        }
                    } catch(e) { console.warn("API Offline, local timer active."); }

                    this.timerInterval = setInterval(() => { this.elapsedSeconds++; }, 1000);
                    
                    // Heartbeat (تم تحسينه لتجنب الـ 404 في حال عدم وجود المسار)
                    this.heartbeatInterval = setInterval(async () => {
                        if(window.LuxAPI && window.LuxAPI.stationHeartbeat) {
                            try { await window.LuxAPI.stationHeartbeat(this.stationId); } catch(e) {}
                        }
                    }, 30000);
                },
                async endSession() {
                    if(!confirm("Terminer la session ?")) return;
                    clearInterval(this.timerInterval);
                    clearInterval(this.heartbeatInterval);
                    
                    try {
                        if(window.LuxAPI && window.LuxAPI.deactivateStation) {
                            await window.LuxAPI.deactivateStation(this.stationId);
                        }
                    } catch(e) {}

                    this.view = 'user';
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
