<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Café LUX — Taza · Café & Pâtisserie</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C9A84C">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CafeOrCoffeeShop",
  "name": "Café LUX",
  "address": { "@type": "PostalAddress", "streetAddress": "Résidence Ziat N28", "addressLocality": "Taza", "addressCountry": "MA" }
}
</script>

<script>
  // ✅ رابط الـ API المصحح لـ Railway
  window.LUX_API_URL = 'https://cafeslux-api-production.up.railway.app'; 
</script>
<script src="api-client.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
/* ── الأنماط الأساسية (CSS) ── */
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#8B6E2F;--bg:#080808;--bg2:#0F0F0F;
  --text:#F2EFE9;--muted:#888;--green:#3DBE7A;--red:#E05252;--cream:#FAFAF5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}

/* ── GATEWAY ── */
#gateway{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease;}
#gateway.hidden{opacity:0;pointer-events:none;}
.gw-logo{font-family:'Cinzel',serif;font-size:52px;color:var(--gold);letter-spacing:10px;text-shadow:0 0 40px rgba(201,168,76,.3);}
.gw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:640px;width:90%;margin-top:20px;}
.gw-tile{background:var(--bg2);border:1px solid #2A2A2A;border-radius:14px;padding:22px 16px;text-align:center;cursor:pointer;transition:all .25s;}
.gw-tile:hover{border-color:var(--gold);transform:translateY(-2px);}

/* ── UI COMPONENTS ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,8,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid #2A2A2A;display:flex;align-items:center;padding:0 24px;height:60px;justify-content:space-between;}
.tb-logo{font-family:'Cinzel',serif;color:var(--gold);font-size:20px;text-decoration:none;letter-spacing:4px;}
.site-top-tabs{display:flex;background:var(--bg2);border-bottom:1px solid #2A2A2A;padding:0 24px;overflow-x:auto;}
.s-tab{padding:14px 20px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;}
.s-tab.active{color:var(--gold);border-bottom:2px solid var(--gold);}

/* ── CART & FORMS ── */
#cart-panel{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--cream);z-index:500;transform:translateX(100%);transition:transform .3s ease;box-shadow:-8px 0 32px rgba(0,0,0,.4);display:flex;flex-direction:column;}
#cart-panel.open{transform:translateX(0);}
.cart-head{background:#1A0A00;padding:16px 20px;color:var(--gold);display:flex;justify-content:space-between;}
.cart-items-list{flex:1;overflow-y:auto;padding:14px;color:#1A0A00;}
.order-btn{width:100%;padding:14px;background:var(--gold);color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin-top:10px;}

/* ── SUCCESS OVERLAY ── */
#success-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center;}
#success-ov.open{display:flex;}
.success-box{background:#fff;border-radius:20px;padding:36px;text-align:center;max-width:360px;color:#1A0A00;}
</style>
</head>
<body>

<div id="gateway">
    <div class="gw-logo">LUX</div>
    <div style="color:var(--muted); font-size:11px; letter-spacing:5px; margin-bottom:40px;">TAZA · 2026</div>
    <div class="gw-grid">
        <div class="gw-tile" onclick="enterPublic()">🛒 <br> Commander</div>
        <div class="gw-tile" onclick="enterReservation()">📅 <br> Réserver</div>
        <div class="gw-tile" onclick="enterTracking()">📦 <br> Suivi</div>
    </div>
</div>

<div id="main-site" style="display:none">
    <div class="topbar">
        <a class="tb-logo" href="#">✦ LUX</a>
        <button onclick="toggleCart()" style="background:var(--gold); border:none; padding:8px 16px; border-radius:20px; font-weight:bold; cursor:pointer;">
            Panier (<span id="cart-count">0</span>)
        </button>
    </div>

    <div class="site-top-tabs">
        <button class="s-tab active" onclick="switchTab('menu')">🛒 Menu</button>
        <button class="s-tab" onclick="switchTab('tracking')">📦 Commandes</button>
        <button class="s-tab" onclick="switchTab('reservation')">📅 Réservation</button>
        <button class="s-tab" onclick="switchTab('account')">👤 Fidélité</button>
    </div>

    <div id="tab-menu" class="site-tab-content" style="padding:20px;">
        <h2 style="font-family:'Cormorant Garamond'; font-size:32px; color:var(--gold); text-align:center;">Notre Menu</h2>
        <div id="menu-content" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:20px;">
            </div>
    </div>

    <div id="tab-tracking" class="site-tab-content" style="display:none; padding:40px 20px; max-width:500px; margin:0 auto;">
        <h3>Suivi de commande</h3>
        <input type="tel" id="track-phone" placeholder="Votre téléphone" style="width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #333; background:#111; color:#fff;">
        <button onclick="trackOrders()" style="width:100%; padding:12px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">Rechercher</button>
        <div id="track-results" style="margin-top:20px;"></div>
    </div>

    <div id="tab-reservation" class="site-tab-content" style="display:none; padding:20px;">
         <h3 style="color:var(--gold)">Réserver une table</h3>
         <input type="text" id="res-name" placeholder="Nom" style="width:100%; padding:10px; margin-bottom:10px;">
         <input type="tel" id="res-phone" placeholder="Téléphone" style="width:100%; padding:10px; margin-bottom:10px;">
         <input type="date" id="res-date" style="width:100%; padding:10px; margin-bottom:10px;">
         <button onclick="submitReservation()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold;">Confirmer</button>
    </div>
</div>

<div id="cart-panel">
    <div class="cart-head">
        <h3>Mon Panier</h3>
        <button onclick="toggleCart()" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer;">✕</button>
    </div>
    <div id="cart-items-list" class="cart-items-list"></div>
    <div style="padding:20px; background:#fff; border-top:1px solid #ddd;">
        <input type="text" id="wo-name" placeholder="Votre Nom" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="tel" id="wo-phone" placeholder="Téléphone" style="width:100%; padding:10px; margin-bottom:10px;">
        <button class="order-btn" onclick="sendOrder()">Commander (Total: <span id="cf-total">0</span> MAD)</button>
    </div>
</div>

<div id="success-ov">
    <div class="success-box">
        <div style="font-size:50px;">✅</div>
        <h2 id="success-title">Envoyé!</h2>
        <p id="success-order-id"></p>
        <button onclick="document.getElementById('success-ov').classList.remove('open')" style="margin-top:20px; padding:10px 20px; background:var(--gold); border:none; cursor:pointer;">Fermer</button>
    </div>
</div>

<script>
/* ─── STATE ─── */
let cart = [];
const MENU_DATA = [
    {n: "Espresso", p: 10, cat: "☕"},
    {n: "Cappuccino", p: 15, cat: "🥛"},
    {n: "Petit Déjeuner LUX", p: 35, cat: "🍳"},
    {n: "Thé Royal", p: 20, cat: "🍵"}
];

/* ─── NAVIGATION ─── */
function enterPublic() {
    document.getElementById('gateway').classList.add('hidden');
    document.getElementById('main-site').style.display = 'block';
    renderMenu();
}
function enterReservation() { enterPublic(); switchTab('reservation'); }
function enterTracking() { enterPublic(); switchTab('tracking'); }

function switchTab(tab) {
    document.querySelectorAll('.site-tab-content').forEach(el => el.style.display = 'none');
    document.getElementById('tab-' + tab).style.display = 'block';
}

/* ─── MENU ─── */
function renderMenu() {
    const cont = document.getElementById('menu-content');
    cont.innerHTML = MENU_DATA.map(item => `
        <div style="background:#fff; color:#000; padding:15px; border-radius:12px; text-align:center;" onclick="addToCart('${item.n}', ${item.p})">
            <div style="font-size:24px;">${item.cat}</div>
            <div style="font-weight:bold;">${item.n}</div>
            <div style="color:var(--gold-d)">${item.p} MAD</div>
        </div>
    `).join('');
}

/* ─── CART ─── */
function addToCart(n, p) {
    cart.push({n, p});
    updateCartUI();
}
function updateCartUI() {
    document.getElementById('cart-count').textContent = cart.length;
    const list = document.getElementById('cart-items-list');
    list.innerHTML = cart.map(i => `<div style="padding:10px; border-bottom:1px solid #eee;">${i.n} - ${i.p} MAD</div>`).join('');
    const total = cart.reduce((s, i) => s + i.p, 0);
    document.getElementById('cf-total').textContent = total;
}
function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }

/* ─── API OPERATIONS (CORRECTED ASYNC) ─── */

// ✅ تصحيح دالة إرسال الطلب
async function sendOrder() {
    const name = document.getElementById('wo-name').value;
    const phone = document.getElementById('wo-phone').value;
    if(!name || !phone) return alert("Nom et téléphone requis");

    const orderData = {
        id: Date.now(),
        customer: name,
        phone: phone,
        items: cart,
        total: cart.reduce((s,i)=>s+i.p, 0),
        status: 'pending'
    };

    try {
        if(typeof LuxAPI !== 'undefined') {
            await LuxAPI.createOrder(orderData);
        }
        document.getElementById('success-order-id').textContent = "Commande #" + String(orderData.id).slice(-6);
        document.getElementById('success-ov').classList.add('open');
        cart = []; updateCartUI(); toggleCart();
    } catch(e) {
        alert("Erreur lors de l'envoi. Tentative de sauvegarde locale.");
        console.error(e);
    }
}

// ✅ تصحيح دالة التتبع (السطر 2049 سابقا)
async function trackOrders() {
    const phone = document.getElementById('track-phone').value;
    const resDiv = document.getElementById('track-results');
    resDiv.innerHTML = "Recherche...";

    try {
        let cust = null;
        if(typeof LuxAPI !== 'undefined') {
            // الآن await تعمل بشكل صحيح لأن الدالة async
            cust = await LuxAPI.getCustomer(phone);
        }
        
        if(!cust) {
            resDiv.innerHTML = "Aucune commande trouvée.";
        } else {
            resDiv.innerHTML = `<h4>Bienvenue ${cust.name}</h4>` + 
                cust.orders.map(o => `<div style="background:#222; padding:10px; margin-top:5px; border-radius:5px;">Commande #${String(o.id).slice(-6)} - Statut: ${o.status}</div>`).join('');
        }
    } catch(e) {
        resDiv.innerHTML = "Erreur de connexion au serveur.";
    }
}

// ✅ تصحيح دالة الحجز
async function submitReservation() {
    const data = {
        name: document.getElementById('res-name').value,
        phone: document.getElementById('res-phone').value,
        date: document.getElementById('res-date').value
    };
    
    try {
        if(typeof LuxAPI !== 'undefined') {
            await LuxAPI.createReservation(data);
        }
        alert("Réservation confirmée!");
    } catch(e) {
        alert("Erreur serveur.");
    }
}

/* ─── INITIALIZATION ─── */
window.onload = async () => {
    if(typeof LuxAPI !== 'undefined') {
        await LuxAPI.init();
        console.log("Lux API Ready");
    }
};
</script>
</body>
</html>
