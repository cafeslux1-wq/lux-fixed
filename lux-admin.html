<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX AI · Maestro Admin Hub</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="api-client.js" defer></script>

    <style>
        :root { --lux-cyan: #00f2ff; --lux-dark: #020617; }
        body { 
            background-color: var(--lux-dark); 
            color: white; 
            font-family: 'Cairo', sans-serif; 
            min-height: 100vh;
        }
        .admin-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 2.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .admin-card:hover { border-color: var(--lux-cyan); transform: scale(1.02); }
        .status-active { color: var(--lux-cyan); text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .status-idle { color: #475569; }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="p-8 md:p-12">
        <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
             <div class="text-right">
                <h1 class="text-4xl font-black italic">إحصائيات <span class="text-cyan-400">Lux AI</span></h1>
                <p class="text-slate-500 mt-2">مراقبة محطات الجيمنج الموحدة مع المايسترو.</p>
            </div>
            <div class="bg-gray-900/50 border border-gray-800 px-6 py-3 rounded-2xl flex items-center gap-3">
                <div :class="apiOnline ? 'bg-green-500 animate-pulse' : 'bg-red-500'" class="w-3 h-3 rounded-full"></div>
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Railway {{ apiOnline ? 'Online' : 'Offline' }}</span>
            </div>
        </header>

        <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
            <div v-for="station in stations" :key="station.id" class="admin-card p-8 flex justify-between items-center group">
                <div class="flex items-center gap-6">
                    <div :class="station.active ? 'bg-cyan-500/10 text-cyan-400' : 'bg-slate-800 text-slate-600'" 
                         class="w-16 h-16 rounded-2xl flex items-center justify-center font-black text-2xl transition-colors">
                        {{station.id}}
                    </div>
                    <div class="text-right">
                        <h4 class="font-bold text-white text-lg">المحطة #{{station.id}}</h4>
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest font-black">الزبون: {{station.user}}</p>
                    </div>
                </div>
                <div class="text-left">
                    <div :class="station.active ? 'status-active' : 'status-idle'" class="text-3xl font-mono font-black">
                        {{station.time}}
                    </div>
                    <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">{{station.active ? 'Active' : 'Idle'}}</p>
                </div>
            </div>
        </main>

        <footer class="max-w-6xl mx-auto mt-20 text-center text-[10px] text-slate-700 font-bold uppercase tracking-[0.5em]">
            LUX x MAESTRO • PROFESSIONAL ADMIN HUB
        </footer>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    apiOnline: true,
                    // هذه البيانات ستحدث تلقائياً عند ربطها بـ api-client.js
                    stations: [
                        { id: 'PS-01', user: 'أحمد', time: '42:10', active: true },
                        { id: 'PS-02', user: '-', time: '00:00', active: false },
                        { id: 'PS-03', user: 'ياسين', time: '04:55', active: true },
                        { id: 'PS-04', user: 'كريم', time: '118:20', active: true }
                    ]
                }
            },
            methods: {
                async refreshData() {
                    // هنا نستخدم LuxAPI المدمج في api-client.js
                    try {
                        if (window.LuxAPI && window.LuxAPI.getStations) {
                            const data = await LuxAPI.getStations();
                            this.stations = data;
                            this.apiOnline = true;
                        }
                    } catch (e) {
                        this.apiOnline = false;
                    }
                }
            },
            mounted() {
                // تحديث البيانات كل 10 ثوانٍ تلقائياً
                this.refreshData();
                setInterval(this.refreshData, 10000);
            }
        }).mount('#app');
    </script>
</body>
</html>
