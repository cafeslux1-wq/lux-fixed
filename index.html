<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFE LUX — Engine v3.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C9A84C; --bg: #0D0D0D; --text: #F0EDE8; --card: #161616; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; }
        
        /* تحسين مظهر المنيو مع الصور */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .product-img { width: 100%; height: 120px; background: #222 url('https://cafeslux.com/logo.png') center/contain no-repeat; object-fit: cover; }
        .product-info { padding: 12px; }
        .product-price { color: var(--gold); font-weight: bold; margin-top: 5px; }

        /* وسائل الدفع العالمية */
        .payment-methods { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .pay-badge { padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid var(--border); background: #111; display: flex; align-items: center; gap: 5px; }
        .pay-badge.active { border-color: var(--gold); color: var(--gold); }

        /* زر الطباعة المباشر بدون صفحات جديدة */
        .print-btn { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0; }
            .lux-ticket { width: 80mm; margin: 0; padding: 5mm; border: none; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <h2 id="page-title" style="font-family:Cinzel; color:var(--gold);">Café LUX Engine</h2>
        <div id="public-view" style="display:none;">
            <p>Bienvenue sur le Site Public & Menu</p>
            <div class="payment-methods">
                <div class="pay-badge">💵 Cash</div>
                <div class="pay-badge">💳 Carte</div>
                <div class="pay-badge">🅿️ PayPal</div>
                <div class="pay-badge">📱 G-Pay</div>
                <div class="pay-badge">📟 TPE</div>
            </div>
            <div class="product-grid" id="menu-container">
                </div>
        </div>

        <div id="pro-view" style="display:none;">
            <h3>Module Professionnel: <span id="mode-name"></span></h3>
            <button class="print-btn" onclick="printTicket()">⎙ Imprimer Ticket Direct</button>
            <div style="margin-top:20px; padding:15px; border:1px dashed var(--gold); border-radius:12px;">
                <p>🛠 Outils d'administration: Ajouter / Modifier / Supprimer</p>
                <button onclick="alert('Ajouter Produit')" style="background:#222; color:var(--gold); border:1px solid var(--gold); padding:5px 10px; cursor:pointer;">+ Ajouter</button>
            </div>
        </div>
    </div>

    <div id="ticket-template" class="lux-ticket" style="display:none;">
        <center>
            <h2 style="font-family:Cinzel;">Café LUX</h2>
            <p>Taza, Maroc</p>
            <hr>
            <div id="ticket-items"></div>
            <hr>
            <h3>Total: 0.00 DH</h3>
        </center>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const view = params.get('view');

        if(mode === 'web' || !mode) {
            document.getElementById('public-view').style.display = 'block';
            document.getElementById('page-title').innerText = "La Carte & Site Public";
        } else {
            document.getElementById('pro-view').style.display = 'block';
            document.getElementById('mode-name').innerText = mode.toUpperCase();
        }

        function printTicket() {
            const ticket = document.getElementById('ticket-template');
            ticket.style.display = 'block';
            window.print();
            ticket.style.display = 'none';
        }

        // محاكي لتحميل المنتجات بالصور
        const products = [
            { name: "Espresso Signature", price: "25 DH" },
            { name: "Croissant Royale", price: "30 DH" },
            { name: "Latte Art", price: "35 DH" }
        ];
        const container = document.getElementById('menu-container');
        products.forEach(p => {
            container.innerHTML += `
                <div class="product-card">
                    <div class="product-img"></div>
                    <div class="product-info">
                        <div style="font-weight:bold">${p.name}</div>
                        <div class="product-price">${p.price}</div>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
