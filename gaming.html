<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Gaming Zone · v9.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="api-client.js" defer></script>

    <style>
        :root { --lux-gold: #C9A84C; --lux-dark: #050505; --lux-card: rgba(15, 15, 16, 0.7); }
        body { font-family: 'Inter', 'Cairo', sans-serif; background-color: var(--lux-dark); color: #FFF; min-height: 100vh; background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%); }
        .lux-card { background: var(--lux-card); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .lux-card:hover { border-color: var(--lux-gold); transform: translateY(-5px); }
        .logo-gold { filter: invert(72%) sepia(17%) saturate(1033%) hue-rotate(1deg) brightness(105%) contrast(105%); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="p-6 md:p-12 flex flex-col items-center">
        
        <header class="w-full max-w-4xl flex justify-between items-center mb-16">
            <div class="flex items-center gap-5 text-right">
                <div class="w-16 h-16 bg-zinc-900 rounded-[1.5rem] flex items-center justify-center border border-zinc-800 shadow-2xl overflow-hidden group">
                    <img src="image_621b48.png" alt="LUX Logo" class="w-12 h-auto logo-gold transition-transform group-hover:scale-110">
                </div>
                <div>
                    <h2 class="text-2xl font-black text-white uppercase italic leading-none font-playfair">
                        LUX <span style="color:var(--lux-gold)">GAMING</span>
                    </h2>
                    <p class="text-[9px] text-zinc-600 font-black uppercase tracking-[0.4em] mt-2">Station #{{stationId}}</p>
                </div>
            </div>
            <a href="lux-admin.html" class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800 hover:border-[#C9A84C] text-zinc-500 hover:text-[#C9A84C] transition-all">
                <i class="fas fa-cogs text-xl"></i>
            </a>
        </header>

        <main class="w-full max-w-xl">
            <div v-if="view === 'user'" class="space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-700">
                <div class="lux-card py-16 px-10 rounded-[3.5rem] text-center relative overflow-hidden">
                    <div class="w-28 h-28 bg-[#C9A84C]/5 rounded-[2.5rem] flex items-center justify-center mx-auto mb-12 border border-[#C9A84C]/10 shadow-inner">
                        <i class="fas fa-play text-[#C9A84C] text-4xl mr-1"></i>
                    </div>
                    <h2 class="text-4xl font-black mb-4 tracking-tight font-playfair italic">Prêt pour l'aventure ?</h2>
                    <p class="text-zinc-500 text-sm mb-12">Tarif Premium : <span class="text-white font-black">{{hourlyRate}} DH / heure</span></p>
                    <button @click="view = 'payment'" class="w-full bg-[#C9A84C] text-black py-6 rounded-[2.2rem] font-black text-xl hover:scale-[1.02] transition-all shadow-lg uppercase tracking-wider">
                        COMMENCER
                    </button>
                </div>
            </div>

            <div v-if="view === 'payment'" class="space-y-4 animate-in zoom-in-95">
                <h3 class="text-2xl font-black mb-8 pr-4 flex items-center gap-4">Mode de paiement</h3>
                <div class="grid grid-cols-1 gap-3">
                    <button v-for="method in paymentMethods" :key="method.id" @click="startSession(method.id)" class="lux-card p-6 rounded-[2.2rem] flex items-center justify-between hover:border-[#C9A84C] group">
                        <div class="flex items-center gap-5">
                            <div class="bg-zinc-800/50 p-4 rounded-2xl group-hover:bg-zinc-700">
                                <i :class="method.icon" :style="{color: method.color}" class="text-xl"></i>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-white text-base">{{method.label}}</p>
                                <p class="text-[9px] text-zinc-600 font-black tracking-widest">{{method.desc}}</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-left text-zinc-800 group-hover:text-[#C9A84C]"></i>
                    </button>
                </div>
            </div>

            <div v-if="view === 'active'" class="space-y-6 animate-in zoom-in-95 duration-500">
                <div class="lux-card py-16 px-10 rounded-[4rem] text-center">
                    <div class="text-7xl font-mono font-black text-white mb-2 tracking-tighter">{{formattedTime}}</div>
                    <p class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.4em] mb-12">TEMPS DE JEU ACTIF</p>
                    <div class="grid grid-cols-2 gap-5 mb-12">
                        <div class="bg-black/40 p-6 rounded-[2.5rem] border border-zinc-800/50 text-right">
                            <p class="text-zinc-600 text-[9px] font-black uppercase mb-2">MONTANT</p>
                            <p class="text-3xl font-black text-green-500">{{consumedAmount.toFixed(2)}} DH</p>
                        </div>
                        <div class="bg-black/40 p-6 rounded-[2.5rem] border border-zinc-800/50 text-right">
                            <p class="text-zinc-600 text-[9px] font-black uppercase mb-2">TARIF</p>
                            <p class="text-3xl font-black text-white">{{hourlyRate}} DH</p>
                        </div>
                    </div>
                    <button @click="endSession" class="w-full bg-rose-500/10 text-rose-500 hover:bg-red-500 hover:text-white py-6 rounded-[2rem] font-black transition-all uppercase">STOP SESSION</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // التأكد من أن الكود يعمل بعد تحميل المتصفح بالكامل
        window.addEventListener('load', () => {
            const { createApp } = Vue;
            const _qs = new URLSearchParams(window.location.search);
            
            createApp({
                data() {
                    return {
                        view: 'user',
                        stationId: _qs.get('station') || '05',
                        hourlyRate: 30,
                        elapsedSeconds: 0,
                        consumedAmount: 0,
                        timerInterval: null,
                        heartbeatInterval: null,
                        paymentMethods: [
                            { id: 'especes', label: 'Espèces (Cash)', icon: 'fas fa-money-bill-wave', color: '#22c55e', desc: 'Paiement au comptoir' },
                            { id: 'paypal',  label: 'PayPal', icon: 'fab fa-paypal', color: '#0070ba', desc: 'Portefeuille numérique' },
                            { id: 'googlepay', label: 'Google Pay', icon: 'fab fa-google-pay', color: '#ffffff', desc: 'Paiement rapide' },
                            { id: 'carte',   label: 'Carte Bancaire', icon: 'fas fa-credit-card', color: '#22d3ee', desc: 'Paiement sécurisé Stripe' }
                        ]
                    }
                },
                computed: {
                    formattedTime() {
                        const h = Math.floor(this.elapsedSeconds / 3600);
                        const m = Math.floor((this.elapsedSeconds % 3600) / 60);
                        const s = this.elapsedSeconds % 60;
                        return `${h > 0 ? h + ':' : ''}${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                    }
                },
                methods: {
                    async startSession(methodId) {
                        this.view = 'active';
                        this.timerInterval = setInterval(() => {
                            this.elapsedSeconds++;
                            this.consumedAmount = (this.hourlyRate / 3600) * this.elapsedSeconds;
                        }, 1000);

                        this.heartbeatInterval = setInterval(async () => {
                            if (window.LuxAPI) {
                                try { await window.LuxAPI.stationHeartbeat(this.stationId); } catch (e) {}
                            }
                        }, 30000);
                    },
                    async endSession() {
                        if (!confirm("Terminer la session ?")) return;
                        clearInterval(this.timerInterval);
                        clearInterval(this.heartbeatInterval);
                        this.view = 'user';
                    }
                }
            }).mount('#app');
        });
    </script>
</body>
</html>
