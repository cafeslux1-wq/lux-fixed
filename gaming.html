<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Gaming Zone · Production</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="api-client.js" defer></script>
    
    <style>
        :root { --lux-gold: #C9A84C; --lux-dark: #050505; }
        body { 
            background-color: var(--lux-dark); 
            color: #FFF; 
            font-family: 'Cairo', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%);
            min-height: 100vh;
        }
        .lux-card { background: rgba(15, 15, 16, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        [v-cloak] { display: none; }
        .font-playfair { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="p-6 md:p-12 flex flex-col items-center">
        
        <header class="w-full max-w-4xl flex justify-between items-center mb-16">
            <div class="flex items-center gap-5 text-right">
                <div>
                    <h2 class="text-2xl font-black text-white italic uppercase font-playfair">
                        LUX <span style="color:var(--lux-gold)">GAMING</span>
                    </h2>
                    <p class="text-[9px] text-gray-500 font-bold tracking-[0.3em] mt-1 uppercase">STATION #{{ stationId }}</p>
                </div>
            </div>
            <div class="text-zinc-500 text-xs font-bold uppercase tracking-widest">
                <i class="fas fa-signal text-[10px] text-green-500 animate-pulse"></i> Online
            </div>
        </header>

        <main class="w-full max-w-xl">
            <div v-if="view === 'user'" class="space-y-4">
                <div v-for="method in paymentMethods" :key="method.id" 
                     @click="startSession(method.id)" 
                     class="lux-card p-6 rounded-[2rem] flex items-center justify-between cursor-pointer hover:border-[#C9A84C] transition-all group">
                    <div class="flex items-center gap-5">
                        <i :class="method.icon" :style="{color: method.color}" class="text-2xl"></i>
                        <div class="text-right">
                            <p class="font-bold text-white">{{method.label}}</p>
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">{{method.desc}}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-left text-zinc-800 group-hover:text-[#C9A84C]"></i>
                </div>
            </div>

            <div v-if="view === 'active'" class="lux-card py-20 px-10 rounded-[3rem] text-center border-[#C9A84C]/20">
                <div class="text-7xl font-mono font-black mb-4 tracking-tighter text-white">{{ formattedTime }}</div>
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.4em] mb-12">SESSION ACTIVE</p>
                <button @click="endSession" class="w-full bg-red-600/10 text-red-500 py-5 rounded-2xl font-black hover:bg-red-600 hover:text-white transition-all uppercase tracking-widest">
                    Terminer la Session
                </button>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;

createApp({
  data() {
    return {
      stations: [],
      currentStationId: 'PS-01', // المعرف الافتراضي للمحطة
      view: 'user', 
      isloading: false,
      paymentMethods: [
        { id: 1, label: 'ساعة واحدة', desc: 'SÉANCE 1H', hours: 1, icon: 'fas fa-clock', color: '#C9A84C' },
        { id: 2, label: 'ساعتين', desc: 'SÉANCE 2H', hours: 2, icon: 'fas fa-bolt', color: '#C9A84C' },
        { id: 3, label: 'عرض السهرة', desc: 'OFFRE NIGHT', hours: 4, icon: 'fas fa-moon', color: '#C9A84C' }
      ]
    };
  },
  computed: {
    currentStation() {
      return this.stations.find(s => s.stationId === this.currentStationId || s.id === this.currentStationId);
    },
    formattedTime() {
      return this.currentStation ? (this.currentStation.time || this.currentStation.remainingTime || "00:00:00") : "00:00:00";
    },
    stationId() {
      return this.currentStationId;
    }
  },
  methods: {
    async fetchGamingData() {
      try {
        if (window.LuxAPI) {
          const data = await window.LuxAPI.getStations();
          if (data && data.length > 0) {
            this.stations = data;
            // التبديل التلقائي للواجهة بناءً على حالة السيرفر
            if (this.currentStation && (this.currentStation.status === 'Active' || this.currentStation.status === 'Warning')) {
              this.view = 'active';
            } else {
              this.view = 'user';
            }
          }
        }
      } catch (error) {
        console.error("⚠️ خطأ في مزامنة البيانات:", error);
      }
    },
    async startSession(method) {
      if (this.isloading) return;
      
      this.isloading = true;
      try {
        // تفعيل الأداء فعلياً عبر السيرفر (Railway)
        // نستخدم دالة activateStation من ملف api-client.js
        await window.LuxAPI.activateStation(this.currentStationId, method.hours);
        
        this.view = 'active';
        await this.fetchGamingData(); // تحديث فوري للحالة
      } catch (error) {
        alert("عذراً، تعذر بدء الجلسة. تأكد من اتصال السيرفر.");
        console.error(error);
      } finally {
        this.isloading = false;
      }
    },
    async endSession() {
      if(confirm('هل تريد إنهاء الجلسة فعلياً؟')) {
        try {
          await window.LuxAPI.deactivateStation(this.currentStationId);
          this.view = 'user';
          await this.fetchGamingData();
        } catch (error) {
          console.error("خطأ في إنهاء الجلسة:", error);
        }
      }
    }
  },
  mounted() {
    // التقاط معرف المحطة من الرابط
    const params = new URLSearchParams(window.location.search);
    if (params.has('id')) {
        this.currentStationId = params.get('id');
    }

    this.fetchGamingData();
    setInterval(() => this.fetchGamingData(), 5000); // تحديث كل 5 ثوانٍ
  }
}).mount('#app');
