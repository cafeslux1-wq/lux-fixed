<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUX Gaming Zone · Station</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --lux-gold: #C9A84C; --lux-dark: #050505; }
        body { background-color: var(--lux-dark); color: #FFF; font-family: 'Cairo', sans-serif; min-height: 100vh; background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%); }
        .lux-card { background: rgba(15, 15, 16, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        [v-cloak] { display: none; }
        .animate-glow { animation: glow 2s infinite; }
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="app" v-cloak class="p-6 md:p-12 flex flex-col items-center">
        
        <header class="w-full max-w-4xl flex justify-between items-center mb-16">
            <div class="flex items-center gap-5">
                <h2 class="text-2xl font-black italic uppercase">LUX <span style="color:var(--lux-gold)">GAMING</span></h2>
            </div>
            <div class="text-[9px] text-gray-500 font-bold tracking-[0.3em] uppercase">
                STATION #{{ currentStationId || '??' }}
            </div>
        </header>

        <main class="w-full max-w-xl text-center">
            
            <div v-if="view === 'loading'" class="py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-[#C9A84C] border-t-transparent mb-4"></div>
                <p class="text-zinc-500 text-xs tracking-widest uppercase">جاري مزامنة المحطة...</p>
            </div>

            <div v-if="view === 'no_id'" class="lux-card p-10 rounded-[2.5rem] border-red-500/20">
                <i class="fas fa-qrcode text-red-500 text-4xl mb-6"></i>
                <p class="text-gray-400 text-sm">يرجى مسح رمز الـ QR الخاص بالمحطة.</p>
            </div>

            <div v-if="view === 'user'" class="space-y-4 text-right">
                <div v-for="method in paymentMethods" :key="method.id" @click="startSession(method)" 
                     class="lux-card p-6 rounded-[2rem] flex items-center justify-between cursor-pointer hover:border-[#C9A84C] transition-all active:scale-95">
                    <div class="flex items-center gap-5">
                        <i :class="method.icon" :style="{color: method.color}" class="text-2xl"></i>
                        <div>
                            <p class="font-bold text-white text-lg">{{ method.label }}</p>
                            <p class="text-[10px] text-gray-500 uppercase">{{ method.desc }}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-left text-zinc-800"></i>
                </div>
            </div>

            <div v-if="view === 'active'" class="lux-card py-16 px-10 rounded-[3rem] border-[#C9A84C]/20">
                <div class="text-7xl font-mono font-black mb-4 tracking-tighter">{{ formattedTime }}</div>
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.4em] mb-12">SESSION ACTIVE</p>
                
                <button @click="endSession" class="w-full bg-red-600/10 text-red-500 py-5 rounded-2xl font-black hover:bg-red-600 hover:text-white transition-all">
                    Terminer la Session
                </button>
            </div>

            <div v-if="isProcessing" class="mt-6 p-4 bg-[#C9A84C]/10 rounded-xl animate-glow">
                <p class="text-[#C9A84C] text-xs font-bold">جاري تفعيل الجهاز وإرسال الأوامر...</p>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="api-client.js"></script>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    stations: [],
                    currentStationId: null,
                    view: 'loading',
                    isProcessing: false,
                    paymentMethods: [
                        { id: 1, label: 'ساعة واحدة', desc: '1 HEURE', hours: 1, icon: 'fas fa-clock', color: '#C9A84C' },
                        { id: 2, label: 'ساعتين', desc: '2 HEURES', hours: 2, icon: 'fas fa-bolt', color: '#C9A84C' }
                    ]
                }
            },
            computed: {
                currentStation() {
                    return this.stations.find(s => String(s.stationId) === String(this.currentStationId) || String(s.id) === String(this.currentStationId));
                },
                formattedTime() {
                    return this.currentStation ? (this.currentStation.time || this.currentStation.remainingTime || "00:00:00") : "00:00:00";
                }
            },
            methods: {
                async refreshData() {
                    try {
                        if (window.LuxAPI) {
                            const data = await window.LuxAPI.getStations();
                            if (data && Array.isArray(data)) {
                                this.stations = data;
                                
                                // إذا كنا في حالة معالجة (Processing) لا نغير الـ view فوراً لنمنع القفز بين الصفحات
                                if (!this.isProcessing) {
                                    if (this.currentStation) {
                                        this.view = (this.currentStation.status === 'Active' || this.currentStation.status === 'Warning') ? 'active' : 'user';
                                    } else {
                                        // إذا لم يجد المحطة في السيرفر بعد، ولكن المعرف موجود في الرابط، ابقَ في حالة التحميل
                                        this.view = this.currentStationId ? 'loading' : 'no_id';
                                    }
                                }
                            }
                        }
                    } catch (e) { console.error("Sync Error"); }
                },
                async startSession(method) {
                    if (this.isProcessing) return;
                    this.isProcessing = true;
                    this.view = 'active'; // تحول تفاؤلي سريع للعداد

                    try {
                        await window.LuxAPI.activateStation(this.currentStationId, method.hours);
                        // انتظر 3 ثوانٍ كاملة لضمان استجابة السيرفر وتحديث قاعدة البيانات
                        setTimeout(async () => {
                            this.isProcessing = false;
                            await this.refreshData();
                        }, 3000);
                    } catch (e) {
                        alert("فشل التفعيل.");
                        this.isProcessing = false;
                        this.refreshData();
                    }
                },
                async endSession() {
                    if (!confirm('إنهاء الجلسة؟')) return;
                    try {
                        await window.LuxAPI.deactivateStation(this.currentStationId);
                        this.refreshData();
                    } catch (e) { console.error(e); }
                }
            },
            mounted() {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) {
                    this.currentStationId = id;
                    this.refreshData();
                    setInterval(() => this.refreshData(), 4000);
                } else {
                    this.view = 'no_id';
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
